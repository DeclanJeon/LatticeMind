name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check shell syntax
        run: bash -n install.sh uninstall.sh bin/* scripts/*.sh tests/*.sh
      - name: Check Python helpers
        run: python3 -m py_compile scripts/*.py
      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          Get-ChildItem install.ps1, windows/*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }
      - name: Run ShellCheck
        run: shellcheck install.sh uninstall.sh bin/* scripts/*.sh tests/*.sh
      - name: Run isolated installer smoke test
        run: bash tests/install-smoke.sh
