name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check shell syntax
        run: bash -n install.sh uninstall.sh bin/* scripts/*.sh tests/*.sh
      - name: Run ShellCheck
        run: shellcheck install.sh uninstall.sh bin/* scripts/*.sh tests/*.sh
      - name: Run isolated installer smoke test
        run: bash tests/install-smoke.sh
